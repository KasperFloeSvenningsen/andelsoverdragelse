<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="utf-8" />
  <title>Blomfelt – omstiller…</title>
  <script>
    /**
     * GitHub Pages 404 redirect
     *
     * GitHub Pages can only serve pre-generated files. Any URL that
     * doesn't map to a file gets this 404.html instead. We use it to
     * redirect wizard token URLs to the correct query-param form so
     * the single static /saelg/ page can handle them.
     *
     * Handles both formats:
     *   /saelg/TOKEN                           (missing basePath)
     *   /andelsoverdragelse/saelg/TOKEN        (correct basePath, old format)
     *
     * Both redirect to:
     *   /andelsoverdragelse/saelg/?token=TOKEN
     */
    (function () {
      var base  = '/andelsoverdragelse';
      var path  = window.location.pathname;
      var qs    = window.location.search;

      // Strip basePath if already present so we work with a clean path
      var clean = path.indexOf(base) === 0 ? path.slice(base.length) : path;
      // Normalise: remove trailing slash (except root)
      clean = clean.replace(/\/+$/, '') || '/';

      // 1. /saelg/<TOKEN> → /saelg/?token=TOKEN  (legacy token-in-path URLs)
      var m = clean.match(/^\/saelg\/([^\/]+)$/);
      if (m) {
        window.location.replace(base + '/saelg/?token=' + encodeURIComponent(m[1]));
        return;
      }

      // 2. Any other known route that is simply missing the basePath prefix
      //    e.g. /admin → /andelsoverdragelse/admin/
      //         /saelg → /andelsoverdragelse/saelg/
      var known = ['/admin', '/saelg', '/'];
      if (known.indexOf(clean) !== -1 || clean.indexOf('/saelg') === 0) {
        window.location.replace(base + clean + (clean === '/' ? '' : '/') + qs);
        return;
      }

      // 3. Fallback → home
      window.location.replace(base + '/');
    })();
  </script>
  <style>
    body { font-family: sans-serif; display: flex; align-items: center;
           justify-content: center; height: 100vh; margin: 0;
           background: #FDF6E1; color: #2C403A; }
  </style>
</head>
<body>
  <p>Omstiller…</p>
</body>
</html>
